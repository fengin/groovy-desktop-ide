name: Build & Release

on:
  push:
    tags:
      - 'v*'   # 推送 tag 如 v0.1.0 时触发构建

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux 依赖
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Groovy Desktop IDE ${{ github.ref_name }}'
          releaseBody: |
            ## Groovy Desktop IDE ${{ github.ref_name }}

            ### 下载说明
            - **Windows**: 下载 `.exe` 或 `.msi` 安装包
            - **macOS (Apple Silicon)**: 下载 `aarch64.dmg`
            - **macOS (Intel)**: 下载 `x64.dmg`
            - **Linux**: 下载 `.AppImage` 或 `.deb`

            > 首次打开后，点击右上角 ⚙️ 配置后端地址和 API Key 即可使用。
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
