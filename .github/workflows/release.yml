name: Build & Release

on:
  push:
    tags:
      - 'v*'   # 推送 tag 如 v0.1.0 时触发构建

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux 依赖
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Groovy Desktop IDE ${{ github.ref_name }}'
          releaseBody: |
            ## Groovy Desktop IDE ${{ github.ref_name }}

            ### 下载说明
            - **Windows 免安装版（推荐）**: 下载 `Groovy.Desktop.IDE_portable.zip`，解压后双击 exe 直接运行
            - **Windows 安装包**: 下载 `_setup.exe`，双击安装到系统
            - **macOS (Apple Silicon)**: 下载 `aarch64.dmg`
            - **macOS (Intel)**: 下载 `x64.dmg`
            - **Linux**: 下载 `.AppImage` 或 `.deb`

            > 首次打开后，点击右上角 ⚙️ 配置后端地址和 API Key 即可使用。
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # Windows: 额外上传免安装便携版 (zip)
      - name: Package portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exePath = "src-tauri/target/${{ matrix.target }}/release/Groovy Desktop IDE.exe"
          if (Test-Path $exePath) {
            $version = "${{ github.ref_name }}"
            $zipName = "Groovy.Desktop.IDE_${version}_portable_x64.zip"
            Compress-Archive -Path $exePath -DestinationPath $zipName
            Write-Output "PORTABLE_ZIP=$zipName" >> $env:GITHUB_OUTPUT
            Write-Output "Portable zip created: $zipName"
          } else {
            Write-Output "WARNING: exe not found at $exePath"
            ls -R src-tauri/target/${{ matrix.target }}/release/*.exe
          }
        id: portable

      - name: Upload portable zip to Release (Windows)
        if: matrix.platform == 'windows-latest' && steps.portable.outputs.PORTABLE_ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.portable.outputs.PORTABLE_ZIP }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
